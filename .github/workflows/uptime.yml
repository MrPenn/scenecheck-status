name: Uptime CI
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  repository_dispatch:
jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          command: readme
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          command: site
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          command: graphs
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
